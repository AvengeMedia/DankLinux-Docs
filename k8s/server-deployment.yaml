kind: Deployment
apiVersion: apps/v1
metadata:
  name: dlx-docs-server-deployment
  namespace: danklinux
  labels:
    app: dlx-docs-server
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: dlx-docs-server
  template:
    metadata:
      labels:
        app: dlx-docs-server
    spec:
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: dlx-docs-server-uploads
      containers:
        - name: dlx-docs-server
          image: replaceme-server
          resources:
            requests:
              cpu: 100m
              memory: 200Mi
            limits:
              memory: 1Gi
              cpu: 500m
          ports:
            - containerPort: 8337
          imagePullPolicy: "Always"
          livenessProbe:
            httpGet:
              path: /health
              port: 8337
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ready
              port: 8337
            initialDelaySeconds: 2
            periodSeconds: 5
          volumeMounts:
            - name: data
              mountPath: /data
          env:
            - name: PORT
              value: "8337"
            - name: ENVIRONMENT
              value: "production"
            - name: UPLOAD_DIR
              value: "/data/uploads"
            - name: CACHE_DIR
              value: "/data/cache"
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: github-token
                  key: token
            - name: GITHUB_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: github-webhook
                  key: secret
            - name: GITHUB_APP_ID
              valueFrom:
                secretKeyRef:
                  name: github-app
                  key: app-id
            - name: GITHUB_APP_PRIVATE_KEY
              valueFrom:
                secretKeyRef:
                  name: github-app
                  key: private-key
            - name: KLIPY_API_KEY
              valueFrom:
                secretKeyRef:
                  name: klipy-api-key
                  key: key
            - name: POEDITOR_CALLBACK_SECRET
              valueFrom:
                secretKeyRef:
                  name: poeditor
                  key: CALLBACK_SECRET
            - name: DISCORD_WEBHOOK_URL
              valueFrom:
                secretKeyRef:
                  name: poeditor
                  key: DISCORD_WEBHOOK_URL
            - name: UPLOAD_TOKEN
              valueFrom:
                secretKeyRef:
                  name: dlx-docs-uploads
                  key: token
